<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8" /> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Vases Collection - Nook Decor</title> 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Didot&display=swap" rel="stylesheet">

<style> 
:root{
  --beige:#DFC9AB;
  --burgundy:#4b0e1f;
  --line:rgba(75,14,31,.18);
}

body{ 
  margin:0; 
  background:var(--beige); 
  font-family:'Poppins',sans-serif;
  color:var(--burgundy); 
} 

header{ 
  background:var(--beige); 
  padding:15px;
  text-align:center; 
  font-size:32px;
  font-family:'Didot',serif;
  font-weight:bold;
  position:relative; 
  color:var(--burgundy); 
  border-bottom:1px solid var(--line);
} 

#langSelect{ 
  position:absolute; 
  right:20px; 
  top:50%; 
  transform:translateY(-50%); 
  padding:8px 14px;
  border:none; 
  border-radius:10px;
  background:var(--burgundy); 
  font-weight:bold;
  color:var(--beige); 
  cursor:pointer; 
  font-family:'Poppins',sans-serif;
} 

.gallery{ 
  display:grid; 
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); 
  gap:30px; 
  padding:20px; 
} 

.item{ 
  width:100%; 
  max-width:420px; 
  margin:auto; 
  text-align:center; 
} 

.img-slider{position:relative;width:100%;} 

.img-slider img{ 
  width:100%; 
  max-height:85vh; 
  object-fit:contain; 
  display:none; 
} 

.img-slider img.active{display:block;} 

.arrow{ 
  position:absolute; 
  top:50%; 
  transform:translateY(-50%); 
  font-size:40px; 
  color:var(--burgundy); 
  cursor:pointer; 
  padding:10px; 
} 

.arrow.left{left:0;} 
.arrow.right{right:0;} 

.price{ 
  font-size:18px;
  font-weight:bold;
  margin:8px 0;
}

.size{
  font-size:13px;
  margin-top:-6px;
  margin-bottom:6px;
  opacity:.85;
}

.desc{ 
  line-height:1.5;
  font-size:14px;
  margin-bottom:8px;
  color:rgba(75,14,31,.85);
  opacity:0; 
  transform:translateY(10px); 
  transition:0.4s; 
} 

.item:hover .desc{opacity:1;transform:translateY(0);} 

.btn{ 
  background:var(--burgundy); 
  border:none; 
  color:var(--beige); 
  padding:8px 18px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer; 
  margin-top:10px; 
  width:100%;
} 

.back-link{ 
  display:block; 
  text-align:center; 
  margin-top:150px;
  margin-bottom:40px;
  color:var(--burgundy); 
  text-decoration:none; 
  font-size:20px;
} 
</style> 
</head> 

<body> 

<header> 
Vases Collection 
<select id="langSelect"> 
<option value="en">English</option> 
<option value="ar">العربية</option> 
</select> 
</header> 

<div class="gallery" id="productContainer"></div> 

<a href="index.html" class="back-link">← Back to Home</a> 

<script> 

const CART_KEY = "nook_cart";

function safeParse(v){
try { return JSON.parse(v); } catch(e){ return null; }
}

function getCart(){ 
const data = safeParse(localStorage.getItem(CART_KEY));
return Array.isArray(data) ? data : [];
} 

function saveCart(cart){ 
localStorage.setItem(CART_KEY, JSON.stringify(cart)); 
}

/* ================= PRICES ================= */

const pairedImages=[];
for(let i=0;i<images.length;i+=2){
pairedImages.push([images[i],images[i+1]||images[i]]);
}

/* ================= RENDER ================= */

function renderProducts(){

const container=document.getElementById("productContainer");
container.innerHTML="";

pairedImages.forEach((pair,idx)=>{

const priceValue=prices[idx];
const sizeValue=sizes[idx];

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<div class="img-slider">
<img src="${pair[0]}" class="active">
<img src="${pair[1]}">
<span class="arrow left">‹</span>
<span class="arrow right">›</span>
</div>

<div class="price">${priceValue} EGP</div>
<div class="size">Size: ${sizeValue}</div>

<p class="desc">Elegant vase adding a luxurious touch to any interior space.</p>

<button class="btn">Add to Cart</button>
`;

container.appendChild(div);

});

}

renderProducts();

</script>

</body>
</html>
