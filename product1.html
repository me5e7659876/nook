<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8" /> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Vases Collection - Nook Decor</title> 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Didot&display=swap" rel="stylesheet">

<style> 
:root{
  --beige:#DFC9AB;
  --burgundy:#4b0e1f;
  --line:rgba(75,14,31,.18);
}

body{ 
  margin:0; 
  background:var(--beige); 
  font-family:'Poppins',sans-serif;
  color:var(--burgundy); 
} 

header{ 
  background:var(--beige); 
  padding:15px;
  text-align:center; 
  font-size:32px;
  font-family:'Didot',serif;
  font-weight:bold;
  position:relative; 
  color:var(--burgundy); 
  border-bottom:1px solid var(--line);
} 

#langSelect{ 
  position:absolute; 
  right:20px; 
  top:50%; 
  transform:translateY(-50%); 
  padding:8px 14px;
  border:none; 
  border-radius:10px;
  background:var(--burgundy); 
  font-weight:bold;
  color:var(--beige); 
  cursor:pointer; 
  font-family:'Poppins',sans-serif;
  transition:0.25s ease;
} 
#langSelect:hover{opacity:.9;}

.gallery{ 
  display:grid; 
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); 
  gap:30px; 
  padding:20px; 
} 

.item{ 
  width:100%; 
  max-width:420px; 
  margin:auto; 
  text-align:center; 
} 

.img-slider{position:relative;width:100%;} 

.img-slider img{ 
  width:100%; 
  max-height:85vh; 
  object-fit:contain; 
  display:none; 
} 

.img-slider img.active{display:block;} 

.arrow{ 
  position:absolute; 
  top:50%; 
  transform:translateY(-50%); 
  font-size:40px; 
  color:var(--burgundy); 
  cursor:pointer; 
  user-select:none; 
  padding:10px; 
} 

.arrow.left{left:0;} 
.arrow.right{right:0;} 

.price{ 
  font-size:18px;
  font-weight:bold;
  color:var(--burgundy); 
  margin:8px 0 2px 0;
}

.size{
  font-size:13px;
  opacity:.8;
  margin-bottom:8px;
}

.desc{ 
  line-height:1.5;
  font-size:14px;
  margin-bottom:8px;
  color:rgba(75,14,31,.85);
  opacity:0; 
  transform:translateY(10px); 
  transition:0.4s; 
} 

.item:hover .desc{opacity:1;transform:translateY(0);} 

.btn{ 
  background:var(--burgundy); 
  border:none; 
  color:var(--beige); 
  padding:8px 18px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer; 
  margin-top:10px; 
  width:100%;
  font-family:'Poppins',sans-serif;
  transition:0.3s;
} 
.btn:hover{opacity:.9;}

.back-link{ 
  display:block; 
  text-align:center; 
  margin-top:150px;
  margin-bottom:40px;
  color:var(--burgundy); 
  text-decoration:none; 
  font-size:20px;
  font-weight:500;
} 

@media(max-width:768px){ 
  .gallery{grid-template-columns:1fr;} 
  .arrow{font-size:48px;} 
  .back-link{ 
    margin-top:350px;
    font-size:22px;
  }
} 
</style> 
</head> 

<body> 

<header> 
  Vases Collection 
  <select id="langSelect"> 
    <option value="en">English</option> 
    <option value="ar">العربية</option> 
  </select> 
</header> 

<div class="gallery" id="productContainer"></div> 

<a href="index.html" class="back-link" id="backLink">← Back to Home</a> 

<script> 

const CART_KEY = "nook_cart";

function safeParse(v){
  try { return JSON.parse(v); } catch(e){ return null; }
}

function getCart(){ 
  const data = safeParse(localStorage.getItem(CART_KEY));
  return Array.isArray(data) ? data : [];
} 

function saveCart(cart){ 
  localStorage.setItem(CART_KEY, JSON.stringify(cart)); 
  localStorage.setItem("cartItems", JSON.stringify(cart)); 
}

function handleAddToCart(btn, product, lang){ 
  let cart = getCart(); 

  const existing = cart.find(i => i.id === product.id);
  if(existing){ 
    existing.qty = (Number(existing.qty) || 1) + 1; 
    existing.name = product.name;
    existing.price = Number(product.price) || existing.price;
  } else { 
    cart.push({
      id: product.id,
      name: product.name,
      price: Number(product.price) || 0,
      img: product.img,
      qty: 1,
      category: "Vases",
      page: location.pathname,
      addedAt: new Date().toISOString()
    }); 
  } 

  saveCart(cart); 

  btn.innerText = lang==="ar" ? "تمت الإضافة ✓" : "Added to Cart ✓"; 
  btn.style.background="#fff"; 
  btn.style.color="#4b0e1f"; 

  setTimeout(()=>{ 
    btn.innerText = lang==="ar" ? "أضف إلى السلة" : "Add to Cart"; 
    btn.style.background="var(--burgundy)"; 
    btn.style.color="var(--beige)"; 
  },1200); 
} 

/* الأسعار الجديدة */
const prices = [
2500,1800,2000,1600,1600,1600,1600,1600,1600,
1600,2000,1600,1600,1700,1700,1700,800,1700,
1200,1800,800
];

/* المقاسات */
const sizes = [
"140 cm","170 cm","160 cm","160 cm","160 cm","160 cm","160 cm","160 cm","160 cm",
"170 cm","160 cm","160 cm","160 cm","160 cm","160 cm","170 cm","90 cm","160 cm",
"120 cm","170 cm","105 cm"
];

const images = [ 
 "https://i.postimg.cc/qR1tqc6J/1768001841165-019ba51e-9a21-76e5-a357-a330bd615413.jpg", 
 "https://i.postimg.cc/TP8nvcng/1768002837828-019ba52d-e6d1-7207-a41b-f66801aa8c27.png", 
 "https://i.postimg.cc/zfRHdHQc/1767991948003-019ba487-95c3-7aa2-a5fb-409b9bfb8865.png", 
 "https://i.postimg.cc/RF76m54j/1768006466036-019ba564-be23-7be7-9aea-3d61f55179c1.png", 
 "https://i.postimg.cc/jjKY1G37/1767917286961-019ba014-b850-74b5-9ecf-fe77694a2f90.png", 
 "https://i.postimg.cc/Gt4WYrtx/1767917932124-019ba01e-5656-7545-9317-2e3e84e9f8ba.jpg"
];

const pairedImages=[];
for(let i=0;i<images.length;i+=2){
pairedImages.push([images[i],images[i+1]||images[i]]);
}

const langSelect=document.getElementById("langSelect");
const backLink=document.getElementById("backLink");

function renderProducts(lang){

const container=document.getElementById("productContainer");
container.innerHTML="";

pairedImages.forEach((pair,idx)=>{

const div=document.createElement("div");
div.className="item";

const priceValue=(typeof prices[idx]!=="undefined")?prices[idx]:prices[prices.length-1];
const sizeValue=sizes[idx];

div.innerHTML=`
<div class="img-slider">
<img src="${pair[0]}" class="active">
<img src="${pair[1]}">
<span class="arrow left">‹</span>
<span class="arrow right">›</span>
</div>

<div class="price">${priceValue} EGP</div>
<div class="size">${sizeValue}</div>

<p class="desc">${lang==="ar"?"مزهرية ديكور أنيقة تضيف لمسة فاخرة لأي مساحة داخلية.":"Elegant vase adding a luxurious touch to any interior space."}</p>
`;

const btn=document.createElement("button");
btn.className="btn";
btn.innerText=lang==="ar"?"أضف إلى السلة":"Add to Cart";

const productId=`vase_${idx+1}`;
const productName=(lang==="ar")?"مزهرية ديكور":"Decorative Vase";

btn.addEventListener("click",()=>handleAddToCart(
btn,
{ id:productId,name:productName,price:priceValue,img:pair[0]},
lang
));

div.appendChild(btn);
container.appendChild(div);

});

initSliders();
}

function initSliders(){
document.querySelectorAll(".img-slider").forEach(slider=>{

const imgs=slider.querySelectorAll("img");
let index=0;

const show=i=>{
imgs.forEach(img=>img.classList.remove("active"));
imgs[i].classList.add("active");
};

slider.querySelector(".left").onclick=()=>{
index=(index-1+imgs.length)%imgs.length;
show(index);
};

slider.querySelector(".right").onclick=()=>{
index=(index+1)%imgs.length;
show(index);
};

setInterval(()=>{
index=(index+1)%imgs.length;
show(index);
},10000);

});
}

langSelect.addEventListener("change",()=>{
const lang=langSelect.value;
document.body.dir=lang==="ar"?"rtl":"ltr";
backLink.textContent=lang==="ar"?"← العودة للرئيسية":"← Back to Home";
renderProducts(lang);
});

renderProducts("en");
</script>

</body>
</html>
